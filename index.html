<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Тренировки">
<meta name="theme-color" content="#000000">
<title>Тренировки — Сергей</title>
<style>
  :root{
    --bg:#000; --card:#141416; --card2:#1c1c1f; --line:#2b2b30;
    --tx:#f5f5f7; --tx2:#98989f; --tx3:#6a6a72;
    --green:#30d158; --amber:#ff9f0a; --accent:#0a84ff; --red:#ff453a;
    --g1:linear-gradient(135deg,#ff6a88,#ff2d55);
    --g2:linear-gradient(135deg,#7a7cff,#4038d8);
    --g3:linear-gradient(135deg,#4fd1e8,#0a84ff);
    --g4:linear-gradient(135deg,#ffb23e,#ff7a3d);
    --gb:linear-gradient(135deg,#34d97b,#17b7a6);
    --gm:linear-gradient(135deg,#bf5af2,#7a7cff);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased}
  input{font-family:inherit}
  .wrap{max-width:500px; margin:0 auto; padding:calc(20px + env(safe-area-inset-top)) 16px 40px}
  .hidden{display:none}

  h1{font-size:32px; font-weight:800; margin:0; letter-spacing:-.03em}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:4px 0 16px}
  .datebadge{font-size:13px; font-weight:700; color:#cdd0ff; background:rgba(122,124,255,.18);
    border:1px solid rgba(122,124,255,.35); padding:7px 13px; border-radius:12px; white-space:nowrap}
  .scard{display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line);
    border-radius:18px; padding:14px 16px; margin-bottom:12px}
  .scard .splay{flex:0 0 auto; width:48px; height:48px; border-radius:50%; background:var(--gm); color:#fff;
    border:none; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  .scard .sinfo{flex:1; min-width:0}
  .scard .st{font-size:15px; font-weight:700; letter-spacing:-.01em}
  .scard .ss{font-size:12.5px; color:var(--tx2); margin-top:3px}
  .scard .sdone{flex:0 0 auto; background:rgba(255,255,255,.07); border:1px solid var(--line); color:var(--tx);
    border-radius:11px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit}
  .scard .sdone:active,.scard .sdone.ok{background:var(--green); color:#052; border-color:var(--green)}
  .habit{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:15px 16px; margin-bottom:14px}
  .hstatus{font-size:15px; font-weight:700; display:flex; align-items:center; gap:9px}
  .dotbig{width:12px; height:12px; border-radius:50%; background:#3a3a42; display:inline-block; flex:0 0 auto}
  .dotbig.on{background:var(--green)}
  .hdots{display:flex; gap:7px; margin:14px 0 11px}
  .dcell{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px}
  .dcirc{width:32px; height:32px; border-radius:50%; background:#24242a; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-size:15px; line-height:1; overflow:hidden}
  .dcell.on .dcirc{background:rgba(48,209,88,.15); border-color:var(--green)}
  .dcell.today .dcirc{box-shadow:0 0 0 2px var(--accent)}
  .dcell .dlbl{font-size:10.5px; color:var(--tx3); font-weight:700}
  .scard .sicon{position:relative; flex:0 0 auto; width:48px; height:48px; border-radius:14px; background:rgba(191,90,242,.16);
    border:1px solid rgba(191,90,242,.30); color:#c9a7ff; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:visible}
  .scard .sicon:active{background:rgba(191,90,242,.30)}
  .scard .sicon svg{width:27px; height:27px}
  .pbadge{position:absolute; right:-5px; bottom:-5px; width:19px; height:19px; border-radius:50%;
    background:var(--gm); color:#fff; font-size:8px; display:flex; align-items:center; justify-content:center;
    border:2px solid var(--card); padding-left:1px}
  .scard .st{cursor:pointer}
  .snum{font-size:16px; font-weight:800; margin-right:1px}
  .dic{display:inline-flex; color:#c9a7ff}
  .dcell.on .dic{color:var(--green)}
  .dic svg{width:16px; height:16px}
  .hmeta{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:var(--tx2)}
  .streak{display:inline-flex; align-items:center; gap:5px; font-weight:700; color:var(--tx3)}
  .streak.on{color:var(--amber); background:rgba(255,159,10,.15); border:1px solid rgba(255,159,10,.34); padding:5px 11px; border-radius:20px}
  .streak svg{width:16px; height:16px}
  .sfbwrap{margin:-6px 0 12px; padding:0 2px}
  .sfbtoggle{background:none; border:none; color:var(--accent); font-family:inherit; font-size:12.5px; font-weight:600; padding:4px 2px; cursor:pointer}
  .sfbbox{display:flex; gap:8px; margin-top:7px}
  .sfbta{flex:1; box-sizing:border-box; background:#141414; border:1px solid #262626; border-radius:11px; color:var(--tx);
    font-family:inherit; font-size:14px; padding:10px 12px; resize:none; line-height:1.4}
  .sfbta:focus{outline:none; border-color:#3a3a3a}
  .sfbta::placeholder{color:#555}
  .sfbsave{flex:0 0 auto; background:rgba(255,255,255,.07); border:1px solid var(--line); color:var(--tx);
    border-radius:11px; padding:0 15px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer}
  .sfbsave:active{background:var(--green); color:#052; border-color:var(--green)}
  .quote{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px 17px; margin:0 0 20px}
  .qtx{font-size:14.5px; line-height:1.55; color:var(--tx)}
  .qauth{font-size:12.5px; color:#9a9aff; margin-top:10px; font-weight:600}
  .stats{display:flex; gap:10px; margin-bottom:22px}
  .stat{flex:1; background:linear-gradient(160deg,#191920,#121216); border:1px solid var(--line); border-radius:16px; padding:14px 15px}
  .stat .v{font-size:30px; font-weight:800; letter-spacing:-.03em; line-height:1}
  .stat .l{font-size:11px; color:var(--tx2); margin-top:5px}

  .seg{display:flex; background:var(--card2); border-radius:13px; padding:4px; margin-bottom:16px; gap:2px}
  .seg button{flex:1; border:none; background:transparent; color:var(--tx2); font-family:inherit;
    font-size:13.5px; font-weight:600; padding:10px 4px; border-radius:10px; cursor:pointer; transition:.15s}
  .seg button.on{background:#34343a; color:#fff}
  .cap{font-size:12.5px; color:var(--tx3); margin:0 2px 14px; font-weight:500}

  .daycard{display:flex; align-items:center; justify-content:space-between; gap:14px; border-radius:22px;
    padding:20px 22px; margin-bottom:13px; cursor:pointer; color:#fff; border:none; width:100%; text-align:left;
    font-family:inherit; transition:transform .12s, filter .12s}
  .daycard:active{transform:scale(.985); filter:brightness(1.06)}
  .daycard .info{min-width:0}
  .daycard .tag{display:block; font-size:11px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; opacity:.82}
  .daycard .t{display:block; font-size:22px; font-weight:800; letter-spacing:-.02em; margin-top:5px; line-height:1.1}
  .daycard .n{flex:0 0 auto; width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800}
  .d1{background:var(--g1)} .d2{background:var(--g2)} .d3{background:var(--g3)} .d4{background:var(--g4)} .db{background:var(--gb)} .dm{background:var(--gm)}

  .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px}
  .back{width:40px;height:40px;border-radius:50%;background:var(--card2);border:1px solid var(--line);
    color:var(--tx); font-size:22px; display:flex;align-items:center;justify-content:center;cursor:pointer}
  .startbtn{background:var(--green); color:#04331f; border:none; border-radius:12px; padding:11px 20px;
    font-size:15px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 6px 20px rgba(48,209,88,.4)}
  .startbtn.run{background:var(--card2); color:var(--tx); border:1px solid var(--line); font-variant-numeric:tabular-nums; font-size:17px; box-shadow:none}
  .whead{border-radius:20px; padding:18px 20px; color:#fff; margin-bottom:14px}
  .whead .tag{font-size:11px;font-weight:700;opacity:.82;text-transform:uppercase;letter-spacing:.09em}
  .whead .t{font-size:24px;font-weight:800;margin-top:5px;letter-spacing:-.02em}
  .whead .s{font-size:12px;opacity:.9;margin-top:5px;font-weight:500}
  .whead.plain{background:none; padding:6px 2px 2px}
  .banner{background:rgba(255,69,58,.10); border:1px solid rgba(255,69,58,.28);
    color:#ff8f88; font-size:12px; border-radius:12px; padding:10px 13px; margin-bottom:14px; line-height:1.45}

  .prog{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:14px}
  .prog .h{font-size:12px; color:var(--tx2); font-weight:600; display:flex; justify-content:space-between}
  .bars{display:flex; align-items:flex-end; gap:6px; height:58px; margin-top:12px}
  .bars .b{flex:1; background:#3a3a42; border-radius:5px 5px 0 0; min-height:3px}
  .bars .b.last{background:var(--green)}

  .painrow{display:flex; gap:10px; margin-bottom:14px}
  .painrow .fld{flex:1}
  .fld label{display:block;font-size:11px;color:var(--tx3);margin-bottom:5px}
  .fld input{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--tx);
    border-radius:10px;padding:9px 11px;font-size:14px;outline:none}

  .warmtoggle{width:100%; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; color:var(--tx); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:11px}
  .warmtoggle .sub{color:var(--tx3); font-size:12px; font-weight:500}
  .chev{transition:transform .2s} .chev.open{transform:rotate(180deg)}

  .sechead{font-size:11.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--tx3); font-weight:700; margin:20px 4px 10px; display:flex; align-items:center; gap:9px}
  .sechead .ln{flex:1;height:1px;background:var(--line)}
  .ex{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:14px 15px; margin-bottom:11px}
  .ex.warm{background:#101012; border-color:#232327}
  .exhd{display:flex; justify-content:space-between; align-items:flex-start; gap:10px}
  .ex .name{font-size:15px; font-weight:700; letter-spacing:-.01em}
  .ex .plan{font-size:12px; color:var(--tx2); margin-top:3px}
  .ex .note{font-size:12px; color:#e0c98a; margin-top:4px}
  .swap{display:inline-block; font-size:11px; color:var(--amber); background:rgba(255,159,10,.13);
    padding:3px 8px; border-radius:7px; margin-top:7px; font-weight:600; line-height:1.35}
  .techbtn{flex:0 0 auto; display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,.07);
    border:1px solid var(--line); color:#dcdce4; border-radius:10px; padding:8px 12px; font-size:12.5px;
    font-weight:600; white-space:nowrap; cursor:pointer; font-family:inherit}
  .cues{margin-top:11px; background:#0e0e10; border:1px solid var(--line); border-radius:12px; padding:11px 13px}
  .cues .c{font-size:12.5px; line-height:1.5; margin:2px 0; color:var(--tx)}
  .cues .c.ok::before{content:"✓ "; color:var(--green); font-weight:800}
  .cues .c.no::before{content:"✗ "; color:var(--red); font-weight:800}
  .cues .vbtn{margin-top:9px; display:inline-flex; align-items:center; gap:6px; background:#fff; color:#000;
    border:none; border-radius:9px; padding:8px 13px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit}
  .cues .vbtn.off{background:transparent;color:var(--tx3);border:1px solid var(--line);cursor:default}

  table.sets{width:100%; border-collapse:collapse; margin-top:12px}
  table.sets th{font-size:10px; color:var(--tx3); font-weight:700; text-transform:uppercase; text-align:center; padding:0 2px 7px}
  table.sets th.l{text-align:left}
  table.sets td{padding:3px 2px; text-align:center; vertical-align:middle}
  .setno{width:24px; color:var(--tx); font-weight:800; font-size:16px}
  .prevc{font-size:12px; color:var(--tx2); white-space:nowrap; min-width:46px}
  .prevc b{color:var(--green); font-weight:700}
  .sinp{width:100%; background:var(--card2); border:1px solid var(--line); color:var(--tx); border-radius:9px;
    padding:10px 4px; font-size:16px; font-weight:600; text-align:center; outline:none}
  .sinp:focus{border-color:var(--green); box-shadow:0 0 0 3px rgba(48,209,88,.16)}
  td.chk{width:36px}
  .done{width:31px;height:31px;border-radius:9px;border:1.5px solid var(--line);background:transparent;color:var(--tx3);
    font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center; transition:.12s}
  tr.setdone .done{background:var(--green); border-color:var(--green); color:#052; transform:scale(1.05); box-shadow:0 0 14px rgba(48,209,88,.55)}
  tr.setdone .sinp{border-color:rgba(48,209,88,.4); background:rgba(48,209,88,.08)}
  .pr{display:inline-block;font-size:9.5px;font-weight:800;color:#1a1200;background:var(--amber);
    padding:1px 5px;border-radius:5px;margin-left:5px;animation:pop .3s ease}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .addset{margin-top:10px; width:100%; background:var(--card2); border:1px dashed var(--line); color:var(--tx2);
    border-radius:10px; padding:10px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit}
  .exvol{font-size:11.5px; color:var(--tx3); margin-top:10px; text-align:right}

  .savebar{margin:20px 0 8px; padding:0}
  .notewrap{margin:22px 0 4px}
  .notelbl{display:block; font-size:12px; color:var(--tx3); margin:0 0 7px 2px; letter-spacing:.02em}
  .wnote{width:100%; box-sizing:border-box; background:#141414; border:1px solid #262626; border-radius:12px; color:var(--tx); font-family:inherit; font-size:15px; padding:12px 14px; resize:none; line-height:1.4}
  .wnote:focus{outline:none; border-color:#3a3a3a}
  .wnote::placeholder{color:#555}
  .savebtn{width:100%; background:#fff; color:#000; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer}
  .rest{position:fixed; left:50%; transform:translateX(-50%); bottom:96px; z-index:20; background:#1c1c22;
    border:1px solid rgba(48,209,88,.4); border-radius:14px; padding:10px 16px; display:none; align-items:center; gap:14px; box-shadow:0 8px 30px rgba(0,0,0,.6),0 0 20px rgba(48,209,88,.12)}
  .rest.show{display:flex}
  .rest .tm{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;min-width:62px;text-align:center;color:var(--green)}
  .rest button{background:transparent;border:1px solid var(--line);color:var(--tx);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

  .modal{position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:50; display:none; align-items:center; justify-content:center; padding:16px}
  .modal.show{display:flex}
  .modal .box{width:100%; max-width:560px}
  .modal .vwrap{position:relative; padding-top:56.25%; background:#000; border-radius:16px; overflow:hidden}
  .modal iframe{position:absolute; inset:0; width:100%; height:100%; border:0}
  .modal .cls{margin-top:12px; width:100%; background:#fff; color:#000; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit}
  .foot{color:var(--tx3); font-size:11.5px; text-align:center; margin-top:24px; line-height:1.6}
  .brandfoot{text-align:center; padding:26px 0 6px}
  .ssmono{display:inline-block; font-size:20px; font-weight:800; letter-spacing:.08em; color:var(--tx2);
    border:1.5px solid var(--line); border-radius:12px; padding:6px 13px; background:linear-gradient(135deg,#1b1b20,#131316)}
  .verline{font-size:11px; color:var(--tx3); margin-top:9px; letter-spacing:.02em}
  .topright{display:flex; gap:10px; align-items:center}
  .musicbtn2{width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#bf5af2,#7a7cff);
    color:#fff; border:none; font-size:18px; cursor:pointer; box-shadow:0 4px 16px rgba(122,124,255,.35); flex:0 0 auto}
</style>
</head>
<body>
<div class="wrap">
  <section id="home">
    <div class="hrow"><h1>Тренировки</h1><div class="datebadge" id="datebadge"></div></div>
    <div class="quote" id="quote">
      <div class="qtx" id="q-tx"></div>
      <div class="qauth" id="q-auth"></div>
    </div>
    <div class="seg">
      <button id="seg-morn" class="on" onclick="setTab('morn')">Растяжка</button>
      <button id="seg-zal" onclick="setTab('zal')">Зал</button>
      <button id="seg-reha" onclick="setTab('reha')">ЛФК</button>
    </div>
    <div class="stats" id="tabstats"></div>
    <div id="cap" class="cap"></div>
    <div id="days"></div>
    <div class="brandfoot"><div class="verline">Тренировки · v1.3.2 · релиз 17 июля 2026</div></div>
  </section>

  <section id="workout" class="hidden">
    <div class="top">
      <button class="back" onclick="leaveWorkout()">‹</button>
      <div class="topright">
        <button class="musicbtn2" onclick="openMusic()" aria-label="Музыка">♪</button>
        <button class="startbtn" id="startbtn" onclick="toggleStart()">▶ Начать</button>
      </div>
    </div>
    <div id="whead" class="whead"></div>
    <div id="progwrap"></div>
    <div id="wbanner"></div>
    <div id="painwrap"></div>
    <div id="warmwrap"></div>
    <div id="exlist"></div>
    <div class="notewrap"><label class="notelbl">Заметка (необязательно)</label><textarea id="wnote" class="wnote" rows="2" placeholder="Как прошло: зал забит, спина ок, устал, пришёл поздно…"></textarea></div>
    <div class="foot">Тренировка завершится сама, если ничего не вводить ~15 минут (время конца — по последнему вводу). Кнопка ниже — если хочешь закрыть сразу.</div>
    <div class="savebar" id="savebar"><button class="savebtn" onclick="finishWorkout(false)">Завершить тренировку</button></div>
  </section>
</div>

<div id="restbar" class="rest"><span>Отдых</span><span class="tm" id="rest-tm">0:00</span>
  <button onclick="restAdd(15)">+15 сек</button><button onclick="restSkip()">Готово, дальше</button></div>
<div class="modal" id="videoModal"><div class="box">
  <div class="vwrap"><iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
  <button class="cls" onclick="closeVideo()">Закрыть · вернуться к тренировке</button></div></div>

<script>
const DOC="https://docs.google.com/document/d/1ryNFDSc1UVDNjrXyuasqVAn-v0ZLaPPx2asd0SjL5iU/edit#bookmark=id.";
function e2(name,sets,reps,rest,o={}){return Object.assign({name,sets,reps,rest},o);}
const ZAL=[
 {tag:"День 1",name:"Грудь + Бицепс",accent:"d1",
  warmup:[e2("Птица-собака",4,"24","1 мин",{vid:"Y2f7vePfhxA"}),e2("Ягодичный мост лёжа",2,"50","1 мин",{vid:"_rk0sjIGUlw"}),
   e2("Поднятие гантелей (суставная)",1,"20","1 мин",{vid:"jycaUr9Yo_k"}),e2("Махи гантелями в стороны",1,"20","1 мин",{vid:"B5PnAqHyJ68"}),
   e2("Махи в наклоне на заднюю дельту",1,"20","1 мин",{vid:"C2CKdSS-YIw",cues:["ok:На старте растяни заднюю дельту — расположись так, чтобы нагрузка была с самого начала","ok:Увеличивай амплитуду минимум вдвое — нагрузка постоянная и выше","no:Не начинай так, что на старте и в середине нагрузки нет (только в крайней точке)"]})],
  main:[

const SK="wlog_v1";
function store(){try{return JSON.parse(localStorage.getItem(SK))||{last:{},sessions:[]}}catch(e){return{last:{},sessions:[]}}}
function saveStore(s){localStorage.setItem(SK,JSON.stringify(s))}
function wId(w){return w.tag+"|"+w.name}
function exKey(w,e){return wId(w)+"::"+e.name}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();}
function plurDay(n){const a=Math.abs(n)%100,b=n%10; if(a>10&&a<20)return"дней"; if(b>1&&b<5)return"дня"; if(b===1)return"день"; return"дней";}
function listFor(t){return t==="zal"?ZAL:REHA}

let TAB="morn";
function setTab(t){TAB=t;
  ["zal","reha","morn"].forEach(k=>document.getElementById("seg-"+k).classList.toggle("on",k===t));
  renderStats(t);
  if(t==="reha"){openW("reha",0);return;}
  renderDays();
}
function renderDays(){
  if(TAB==="morn"){renderStretch();return;}
  const list=listFor(TAB);
  document.getElementById("cap").textContent = TAB==="zal"
    ? "Сплит 4 дня · до 28 декабря 2026 · старт с нуля"
    : "Реабилитация спины · пн · ср · пт";
  document.getElementById("days").innerHTML=list.map((w,i)=>{
    const cnt=w.warmup.length+w.main.length;
    return `<button class="daycard ${w.accent}" onclick="openW('${TAB}',${i})">
      <span class="info"><span class="tag">${w.tag}</span><span class="t">${w.name}</span></span>
      <span class="n">${cnt}</span></button>`;
  }).join("");
}
function renderStretch(){
  const s=store();
  const morn=(s.sessions||[]).filter(x=>x.prog==="morn");
  const set=new Set(morn.map(x=>dayKey(x.ts)));
  const now=new Date(), todayK=dayKey(now.getTime());
  const dow=(now.getDay()+6)%7, monday=new Date(now); monday.setDate(now.getDate()-dow); monday.setHours(0,0,0,0);
  const L=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
  let doneWeek=0,dots="";
  for(let i=0;i<7;i++){const dd=new Date(monday); dd.setDate(monday.getDate()+i); const k=dayKey(dd.getTime());
    const dayS=[...new Set(morn.filter(x=>dayKey(x.ts)===k).map(x=>x.sidx))];
    const syms=dayS.map(si=>STRETCH[si]?`<span class="dic">${STRETCH[si].ic}</span>`:"").join("");
    const done=dayS.length>0; if(done)doneWeek++;
    dots+=`<div class="dcell ${done?'on':''} ${k===todayK?'today':''}"><div class="dcirc">${syms}</div><span class="dlbl">${L[i]}</span></div>`;}
  let streak=0; const cur=new Date(now); cur.setHours(0,0,0,0);
  if(!set.has(dayKey(cur.getTime()))) cur.setDate(cur.getDate()-1);
  while(set.has(dayKey(cur.getTime()))){streak++; cur.setDate(cur.getDate()-1);}
  const todaySet=new Set(morn.filter(x=>dayKey(x.ts)===todayK).map(x=>x.sidx));
  const todayDone=todaySet.size>0;
  document.getElementById("cap").textContent="";

function markStretch(i){

  if(s.sessions.some(x=>x.prog==="morn"&&x.sidx===i&&dayKey(x.ts)===tk)){renderStretch();return;}
  s.sessions.push({ts:now.getTime(),prog:"morn",sidx:i,title:STRETCH[i].name,date:now.toLocaleDateString("ru-RU")});
  saveStore(s);
  syncToSheet("morn",[[now.toLocaleDateString("ru-RU"),now.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}),STRETCH[i].name,""]]);

function classifyProg(x){if(x.prog)return x.prog; if(x.tag==="Реабилитация")return "reha"; if(x.tag==="Утро")return "morn"; return "zal";}
function renderStats(tab){
  tab=tab||TAB;
  const s=store(),wk=Date.now()-7*864e5,sess=s.sessions||[];
  const tile=(v,l)=>`<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  const el=document.getElementById("tabstats");
  if(tab==="morn"){el.innerHTML="";return;}
  const f=sess.filter(x=>classifyProg(x)===tab);
  const week=f.filter(x=>x.ts>wk).length,total=f.length;
  if(tab==="reha"){
    const lp=[...f].reverse().find(x=>x.painAfter!==undefined&&x.painAfter!=="");
    el.innerHTML=tile(week,"на этой неделе")+tile(total,"всего")+tile(lp?lp.painAfter:"—","боль спины, посл.");
  } else {
    const lv=[...f].reverse().find(x=>x.volume);
    el.innerHTML=tile(week,"на этой неделе")+tile(total,"всего в зале")+tile(lv&&lv.volume?Math.round(lv.volume):0,"тоннаж, посл.");
  }
}

function progHTML(w,s){
  const vols=(s.sessions||[]).filter(x=>x.wid===wId(w)&&x.volume).slice(-8).map(x=>x.volume);

function cuesHTML(e){
  const lines=(e.cues||[]).map(c=>{const ok=c.startsWith("ok:");return `<div class="c ${ok?'ok':'no'}">${c.slice(3)}</div>`;}).join("");

  else vbtn="";

function exBlock(w,e,s,nokg){
  const key=exKey(w,e),prev=s.last[key]||null;
  const note=e.note?`<div class="note">${e.note}</div>`:"";
  const swap=e.swap?`<div class="swap">↺ ${e.swap}</div>`:"";
  const hasCues=e.cues&&e.cues.length;
  let tech="";
  if(hasCues) tech=`<button class="techbtn" onclick="toggleCues(this)">Техника ▾</button>`;
  else if(e.vid) tech=`<button class="techbtn" onclick="openVideo('${e.vid}'${e.start?","+e.start:""})">▶ Видео</button>`;
  else if(e.docid) tech=`<button class="techbtn" onclick="openDoc('${e.docid}')">▶ Разбор</button>`;
  let rows="";
  for(let i=0;i<e.sets;i++){
    const p=prev&&prev[i]?prev[i]:null;
    const pTxt=p?(nokg?`× <b>${p.reps||"—"}</b>`:`<b>${p.kg||"—"}</b> × ${p.reps||"—"}`):"—";
    const kgCell=nokg?"":`<td><input class="sinp kg" inputmode="decimal" ${p&&p.kg?`value="${p.kg}"`:""} placeholder="кг"></td>`;
    rows+=`<tr data-pk="${p&&p.kg?p.kg:""}">
      <td class="setno">${i+1}</td><td class="prevc">${pTxt}</td>${kgCell}
      <td><input class="sinp rp" inputmode="numeric" placeholder="${p&&p.reps?p.reps:e.reps}"></td>
      <td class="chk"><button class="done" onclick="toggleSet(this,'${e.rest}')">✓</button></td></tr>`;
  }
  const kgTh=nokg?"":`<th>Кг</th>`;
  return `<div class="ex ${nokg?'warm':''}" data-key="${key}" data-nokg="${nokg?1:0}" data-rest="${e.rest}">
    <div class="exhd"><div><div class="name">${e.name}</div><div class="plan">План ${e.sets}×${e.reps}${e.rest!=="—"?" · отдых "+e.rest:""}</div>${swap}</div>${tech}</div>
    ${hasCues?cuesHTML(e):""}
    <table class="sets"><thead><tr><th>№</th><th class="l">Прошлый</th>${kgTh}<th>Повт.</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    <div class="exvol"></div></div>`;
}

function collectSets(){let totalVol=0;const collected={};
  document.querySelectorAll("#warmbody .ex, #exlist .ex").forEach(exEl=>{const key=exEl.dataset.key,sets=[];
    exEl.querySelectorAll("tbody tr").forEach(tr=>{const kgi=tr.querySelector(".kg");const kg=kgi?kgi.value.trim():"";const reps=tr.querySelector(".rp").value.trim();
      if(kg||reps){sets.push({kg,reps});totalVol+=(parseFloat(kg)||0)*(parseInt(reps)||0);}});
    if(sets.length)collected[key]=sets;});
  return {collected,totalVol};}
function finishWorkout(auto){
  if(FINISHED)return;
  const {collected,totalVol}=collectSets();
  if(!Object.keys(collected).length){ if(auto){FINISHED=true;clearInterval(idleInt);clearInterval(timerInt);return;} alert("Нет введённых данных."); return; }
  const s=store();Object.assign(s.last,collected);
  const end=auto?(lastAct||Date.now()):Date.now();
  const rec={ts:end,wid:wId(CUR),prog:CURTAB,date:new Date().toLocaleDateString("ru-RU"),title:CUR.name,tag:CUR.tag,volume:totalVol};
  if(START){rec.start=new Date(START).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
    rec.end=new Date(end).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});rec.durMin=Math.round((end-START)/60000);}
  const pa=document.getElementById("pain-a"),pb=document.getElementById("pain-b"),bw=document.getElementById("bw");
  if(pa)rec.painBefore=pa.value;if(pb)rec.painAfter=pb.value;if(bw)rec.bw=bw.value;
  s.sessions=s.sessions||[];s.sessions.push(rec);saveStore(s);
  const tstr=rec.start||new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  const estr=rec.end||new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  const wn=document.getElementById("wnote"); const note=wn?wn.value.trim():""; rec.note=note;
  const rows=[];
  Object.keys(collected).forEach(function(key){const exName=key.split("::")[1];
    collected[key].forEach(function(st,idx){const kg=st.kg||"",reps=st.reps||"",ton=(parseFloat(st.kg)||0)*(parseInt(st.reps)||0);
      if(CURTAB==="reha") rows.push([rec.date,tstr,exName,idx+1,kg,reps,rec.painBefore||"",rec.painAfter||"",rec.bw||"",rec.durMin||"",note,estr]);
      else rows.push([rec.date,tstr,CUR.name,exName,idx+1,kg,reps,ton,rec.durMin||"",note,estr]);});});
  syncToSheet(CURTAB,rows);
  FINISHED=true;restSkip();clearInterval(timerInt);clearInterval(idleInt);
  if(!auto)alert("Завершено"+(rec.durMin?` · ${rec.durMin} мин`:"")+". В следующий раз подставлю «прошлый раз».");
  showHome();
}
function leaveWorkout(){ if(START&&!FINISHED&&Object.keys(collectSets().collected).length){finishWorkout(true);} else {FINISHED=true;clearInterval(idleInt);clearInterval(timerInt);showHome();} }
